pluginManagement {
    repositories {
        gradlePluginPortal()
        maven {
            name = 'MinecraftForge'
            url = 'https://maven.minecraftforge.net/'
        }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.7.0'
}

rootProject.name = 'TrueUUID'

// The active target matrix is explicit. Add an adapter here only after it has
// a self-contained build and the acceptance gates in docs/development pass.
include 'shared:protocol'
include 'platform:forge-1.20.1'
include 'platform:neoforge-1.21.1'
include 'platform:forge-1.21.1'
