modLoader="javafml"
loaderVersion="[48,)"
license="GNU LGPL 3.0"

[[mods]]
modId="trueuuid"
version="${mod_version}"
displayName="TrueUUID"
displayURL="https://github.com/YuWan-030/TrueUUID"
logoFile="trueuuid-banner.png"
authors="YuWan-030, wish131400, F1xGOD"
description='''A Minecraft authentication mod for offline-mode servers. It securely verifies premium accounts during login while keeping each player's access token on their own client.'''

[[mixins]]
config="trueuuid.mixins.json"

[[dependencies.trueuuid]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

# Built against 1.20.2/Forge 48. 1.20.2 is protocol 764 and shares it with no
# other patch (the first configuration-phase release), so this range has no
# widen candidate — it stays a single-patch declaration permanently. See
# docs/architecture/version-consolidation-roadmap.md.
[[dependencies.trueuuid]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},1.20.3)"
ordering="NONE"
side="BOTH"
