modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="TrueUUID"
displayURL="https://github.com/YuWan-030/TrueUUID"
logoFile="trueuuid-banner.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="trueuuid.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="${neoforge_version_range}"
ordering="NONE"
side="BOTH"

# 1.20.2-era NeoForge predates the neoforge.mods.toml rename and the
# type="required" dependency syntax, hence META-INF/mods.toml and
# mandatory=true here. 1.20.2 is protocol 764, shared with no other patch, so
# this range stays single-patch permanently. See
# docs/architecture/version-consolidation-roadmap.md.
[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
