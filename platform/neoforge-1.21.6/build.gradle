plugins {
    id 'java-library'
    id 'maven-publish'
    id 'eclipse'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.118'
}

evaluationDependsOn(':shared:protocol')
def sharedProtocolMain = project(':shared:protocol')
        .extensions.getByType(org.gradle.api.tasks.SourceSetContainer)
        .named('main')
def adapterMain = "${rootDir}/platform/neoforge-common/src/main"
def adapterTests = "${rootDir}/platform/neoforge-common/src/test"
def minecraftVersion = '1.21.6'
def neoForgeVersion = '21.6.20-beta'

group = 'cn.alini'
version = providers.gradleProperty('mod_version').get()
// Built against 1.21.6/NeoForge 21.6 — a beta-only NeoForge line (21.6.20-beta
// is the last build, checked 2026-07-16; the line never got a stable). 1.21.6
// is protocol 771, shared with no other patch, so minecraftRange stays
// single-patch permanently. javafml is "[3,)" to match 21.6's own manifest.
// See docs/architecture/version-consolidation-roadmap.md and target-matrix.md.
ext.neoforgeMetadata = [
        loaderRange: "[${neoForgeVersion},)",
        minecraftRange: '[1.21.6,1.21.7)',
        javafmlRange: '[3,)'
]
apply from: "${rootDir}/platform/neoforge-common/metadata.gradle"

base { archivesName = 'trueuuid' }
repositories { mavenCentral() }

sourceSets.main.java.srcDir "${adapterMain}/java"
sourceSets.main.java.srcDir "${rootDir}/platform/forgelike-common/src/main/java"
sourceSets.main.java.srcDir "${rootDir}/platform/forgelike-common/src/pause-pose/java"
sourceSets.test.java.srcDir "${adapterTests}/java"
sourceSets.main.resources.srcDir "${rootDir}/platform/common-assets/src/main/resources"

// Minecraft 1.21.6+ replaced the GUI PoseStack with Matrix3x2fStack. Keep
// that render-only change in this target; login/authentication remains shared.
def modernGuiSources = [
        'cn/alini/trueuuid/client/ClientAccountStatus.java',
        'cn/alini/trueuuid/TrueuuidClientOverlay.java'
]

java { toolchain.languageVersion = JavaLanguageVersion.of(21) }

neoForge {
    version = neoForgeVersion
    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', 'trueuuid'
        }
        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', 'trueuuid'
        }
        configureEach { logLevel = org.slf4j.event.Level.INFO }
    }
    mods {
        trueuuid {
            sourceSet(sourceSets.main)
            sourceSet(sharedProtocolMain.get())
        }
    }
}

sourceSets.main.output.dir(sharedProtocolMain.get().output)

dependencies {
    implementation project(':shared:protocol')
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

tasks.named('compileJava', JavaCompile).configure {
    source = files(fileTree("${adapterMain}/java") { exclude modernGuiSources },
            fileTree("${rootDir}/platform/forgelike-common/src/main/java"),
            fileTree("${rootDir}/platform/forgelike-common/src/pause-pose/java"),
            fileTree("${rootDir}/platform/neoforge-common/src/gui-matrix-2d/java"),
            fileTree("${rootDir}/platform/neoforge-common/src/overlay-21.6-21.10/java"),
            fileTree('src/main/java'))
}

tasks.named('jar', Jar).configure {
    archiveFileName = "trueuuid-${project.version}-neoforge-${minecraftVersion}.jar"
    from { project(':shared:protocol').sourceSets.main.output }
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
tasks.named('test') { useJUnitPlatform() }
