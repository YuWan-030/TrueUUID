modLoader="javafml"
loaderVersion="[58,)"
license="GNU LGPL 3.0"

[[mods]]
modId="trueuuid"
version="${mod_version}"
displayName="TrueUUID"
displayURL="https://github.com/YuWan-030/TrueUUID"
logoFile="trueuuid-banner.png"
authors="YuWan-030, wish131400, F1xGOD"
description='''A Minecraft authentication mod for offline-mode servers. It securely verifies premium accounts during login while keeping each player's access token on their own client.'''

[[mixins]]
config="trueuuid.mixins.json"

[[dependencies.trueuuid]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

# Built against 1.21.8 mappings/Forge 58. Only 1.21.7 (protocol 772, Forge 57)
# is a wire-level match for this build; 1.21.6 is protocol 771 and gets its own
# module (forge-1.21.6). Widen this to "[1.21.7,1.21.9)" (and loaderVersion to
# "[57,)") only after a two-sided login run passes on 1.21.7 — declared range
# unchanged until then. See docs/architecture/version-consolidation-roadmap.md
# and target-matrix.md.
[[dependencies.trueuuid]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},1.21.9)"
ordering="NONE"
side="BOTH"
