name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.target }} (JDK ${{ matrix.java }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Forge 1.20.1
            java: '17'
            tasks: ':shared:protocol:test :platform:forge-1.20.1:test'
          - target: Forge 1.21.1
            java: '21'
            tasks: ':shared:protocol:test :platform:forge-1.21.1:build'
          - target: NeoForge 1.21.1
            java: '21'
            tasks: ':shared:protocol:test :platform:neoforge-1.21.1:build'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - name: Build and test
        run: ./gradlew ${{ matrix.tasks }} --no-daemon --stacktrace
