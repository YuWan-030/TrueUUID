name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed version tag with a draft GitHub Release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Validate draft release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      approved: ${{ steps.release.outputs.approved }}
      release_id: ${{ steps.release.outputs.release_id }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - id: release
        name: Validate tag, changelog, and approvals
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REPOSITORY" == 'YuWan-030/TrueUUID' ]]
          [[ "$GITHUB_REF" == 'refs/heads/main' ]]
          [[ "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
          version="${BASH_REMATCH[1]}"
          [[ "$(sed -n 's/^mod_version=//p' gradle.properties)" == "$version" ]]
          [[ "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" == tag ]]
          tag_object=$(git rev-parse "refs/tags/${RELEASE_TAG}")
          [[ "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified')" == true ]]
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          tag_commit=$(git rev-list -n 1 "$RELEASE_TAG")
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
          ./scripts/release/validate-targets.sh
          approved=$(jq -c \
            '{include: [.targets[] | select(.release == true) | {target: .id}]}' \
            release/targets.json)
          jq -e '.include | length > 0' <<<"$approved" >/dev/null
          release_json=$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,tagName,isDraft,isPrerelease,body)
          jq -e --arg tag "$RELEASE_TAG" \
            '.tagName == $tag and .isDraft == true and .isPrerelease == false and
             (.body | length > 0)' <<<"$release_json" >/dev/null
          jq -j '.body' <<<"$release_json" > release-changelog.md
          ./scripts/release/validate-changelog.sh release-changelog.md
          echo "approved=$approved" >> "$GITHUB_OUTPUT"
          echo "release_id=$(jq -r '.databaseId' <<<"$release_json")" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Freeze the draft GitHub changelog
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frozen-changelog
          path: release-changelog.md
          if-no-files-found: error
          overwrite: true
          retention-days: 14

  full-self-test:
    name: Full release self-test
    needs: [metadata, publishing-access]
    uses: ./.github/workflows/self-test.yml
    with:
      ref: ${{ needs.metadata.outputs.tag }}
    permissions:
      contents: read

  publishing-access:
    name: Validate publishing credentials
    needs: metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          persist-credentials: false
      - name: Validate GitHub Release write access
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.metadata.outputs.release_id }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          jq -e --arg tag "$RELEASE_TAG" \
            '.tag_name == $tag and .draft == true and .prerelease == false' \
            <<<"$release_json" >/dev/null
          jq '{body, draft: true, prerelease: false}' \
            <<<"$release_json" > github-release-write-probe.json
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            --input github-release-write-probe.json >/dev/null
          echo "Verified GitHub Release write access."
      - name: Validate Modrinth and CurseForge publishing access
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID || secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curseforge_project_id=$(jq -r '.curseforge_project_id' release/targets.json)
          ./scripts/release/validate-publishing-access.sh "$curseforge_project_id"

  attach:
    name: Attach approved artifacts
    needs: [metadata, full-self-test]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          persist-credentials: false
      - name: Download all tested artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: tested-artifacts
      - name: Collect only release-approved JARs
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-assets
          while IFS= read -r target_id; do
            target=$(./scripts/release/validate-targets.sh --approved "$target_id")
            expected=$(jq -r --arg version "$VERSION" \
              '.artifact | gsub("%VERSION%"; $version)' <<<"$target")
            source_dir="tested-artifacts/release-${target_id}"
            (cd "$source_dir" && sha256sum --check SHA256SUMS)
            source_jar="${source_dir}/$(basename "$expected")"
            [[ -f "$source_jar" ]]
            cp "$source_jar" release-assets/
          done < <(jq -r '.targets[] | select(.release == true) | .id' release/targets.json)
          (cd release-assets && sha256sum -- *.jar > SHA256SUMS)
      - name: Attach tested assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

  publish-external:
    name: Publish ${{ matrix.target }}
    needs: [metadata, attach]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.metadata.outputs.approved) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          persist-credentials: false
      - name: Download tested target artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-${{ matrix.target }}
          path: tested-artifact
      - name: Download the frozen GitHub changelog
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frozen-changelog
          path: frozen-changelog
      - name: Verify artifact and publishing metadata
        env:
          TARGET_ID: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          target=$(./scripts/release/validate-targets.sh --approved "$TARGET_ID")
          expected=$(jq -r --arg version "$VERSION" \
            '.artifact | gsub("%VERSION%"; $version)' <<<"$target")
          loader=$(jq -r '.loader' <<<"$target")
          game_version=$(jq -r '.game_version' <<<"$target")
          curseforge_project_id=$(jq -r '.curseforge_project_id' release/targets.json)
          (cd tested-artifact && sha256sum --check SHA256SUMS)
          tested_jar="tested-artifact/$(basename "$expected")"
          [[ -f "$tested_jar" ]]
          [[ "$curseforge_project_id" =~ ^[1-9][0-9]*$ ]]
          mkdir -p "$(dirname "$expected")"
          cp "$tested_jar" "$expected"
          ./scripts/release/validate-changelog.sh frozen-changelog/release-changelog.md
          {
            echo "RELEASE_JAR=$expected"
            echo "RELEASE_LOADER=$loader"
            echo "RELEASE_GAME_VERSION=$game_version"
            echo "CURSEFORGE_PROJECT_ID=$curseforge_project_id"
          } >> "$GITHUB_ENV"
      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID || secrets.MODRINTH_PROJECT_ID }}
          TARGET_ID: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$MODRINTH_TOKEN" ]]
          [[ "$MODRINTH_PROJECT_ID" =~ ^[0-9A-Za-z]{8}$ ]]
          ./scripts/release/publish-modrinth.sh \
            "$TARGET_ID" "$VERSION" frozen-changelog/release-changelog.md
      - id: curseforge-preflight
        name: Check for an existing CurseForge artifact
        shell: bash
        run: |
          set -euo pipefail
          state=$(./scripts/release/check-curseforge-artifact.sh \
            "$CURSEFORGE_PROJECT_ID" "$RELEASE_JAR")
          case "$state" in
            missing) echo "upload=true" >> "$GITHUB_OUTPUT" ;;
            identical)
              echo "CurseForge already has the identical artifact."
              echo "upload=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected CurseForge preflight result: $state" >&2
              exit 69
              ;;
          esac
      - name: Publish to CurseForge
        if: steps.curseforge-preflight.outputs.upload == 'true'
        uses: Kir-Antipov/mc-publish@52307b03863581dec6b652b83e597aec02ebb075 # v3.3.1
        with:
          curseforge-id: ${{ env.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ env.RELEASE_JAR }}
          name: TrueUUID ${{ needs.metadata.outputs.version }} for ${{ matrix.target }}
          version: ${{ needs.metadata.outputs.version }}+${{ matrix.target }}
          version-type: release
          changelog-file: frozen-changelog/release-changelog.md
          loaders: ${{ env.RELEASE_LOADER }}
          game-versions: ${{ env.RELEASE_GAME_VERSION }}
          retry-attempts: 1
          fail-mode: fail

  publish-github:
    name: Publish GitHub Release
    needs: [metadata, publish-external]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download the frozen GitHub changelog
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frozen-changelog
          path: frozen-changelog
      - name: Publish only after every external upload succeeds
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_json=$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease,body)
          jq -e '.isDraft == true and .isPrerelease == false' \
            <<<"$release_json" >/dev/null
          jq -j '.body' <<<"$release_json" > current-changelog.md
          if ! cmp --silent frozen-changelog/release-changelog.md current-changelog.md; then
            echo "The draft changelog changed while the release was running." >&2
            exit 73
          fi
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --notes-file frozen-changelog/release-changelog.md \
            --draft=false \
            --latest
