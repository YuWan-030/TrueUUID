name: Full Self-Test

on:
  workflow_call:
    inputs:
      ref:
        description: Commit or tag to test
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      ref:
        description: Optional commit, branch, or tag; defaults to the selected workflow ref
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: self-test-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Read target matrix
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - id: targets
        name: Validate and export targets
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/release/validate-targets.sh
          matrix=$(jq -c '{include: [.targets[] | {target: .id, java: (.java | tostring), build_task: .build_task}]}' release/targets.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-smoke:
    name: ${{ matrix.target }} full self-test (JDK ${{ matrix.java }})
    needs: matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - name: Install headless client runtime
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends xvfb libgl1-mesa-dri
      - id: build
        name: Build, test, and verify release JAR
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :shared:protocol:test "${{ matrix.build_task }}" --no-daemon --stacktrace
          ./scripts/ci/verify-release-jar.sh "${{ matrix.target }}" "self-test-output/${{ matrix.target }}/release"
      - name: Preserve verified release JAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target }}
          path: self-test-output/${{ matrix.target }}/release/
          if-no-files-found: error
          retention-days: 14
      - id: server
        name: Boot localhost development server
        shell: bash
        run: ./scripts/ci/runtime-smoke.sh "${{ matrix.target }}" server "self-test-output/${{ matrix.target }}/logs"
      - name: Boot headless development client
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        shell: bash
        run: ./scripts/ci/runtime-smoke.sh "${{ matrix.target }}" client "self-test-output/${{ matrix.target }}/logs"
      - name: Preserve runtime diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: self-test-logs-${{ matrix.target }}
          path: self-test-output/${{ matrix.target }}/logs/
          if-no-files-found: ignore
          retention-days: 7
