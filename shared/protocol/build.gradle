plugins {
    id 'java-library'
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

// Matrix-only behavior is selected at compile time. Normal builds compile the
// release implementation, which contains no environment-controlled logging or
// migration auto-confirm path.
def acceptanceHooks = providers.gradleProperty('trueuuidAcceptanceHooks')
        .map { it.toBoolean() }
        .getOrElse(false)
sourceSets.main.java.srcDir(
        acceptanceHooks ? 'src/acceptanceHooks/java' : 'src/releaseHooks/java'
)

repositories {
    mavenCentral()
}

dependencies {
    // Minecraft ships Gson on every supported loader. Keep it compile-only so
    // shared/protocol remains loader-neutral and platform JARs do not embed a
    // second Gson copy.
    compileOnly 'com.google.code.gson:gson:2.10.1'
    testImplementation 'com.google.code.gson:gson:2.10.1'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('test') {
    useJUnitPlatform()
}
